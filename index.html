<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Validation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

  <div class="card shadow p-4 rounded-4" style="width: 400px;">
    <h3 class="text-center mb-3">Registration Form</h3>
    <form id="myForm" onsubmit="return validateForm()">
      <!-- Full Name -->
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" onchange="validateName()" />
        <small class="text-danger" id="nameError"></small>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email ID</label>
        <input type="email" class="form-control" id="email" onchange="validateEmail()" />
        <small class="text-danger" id="emailError"></small>
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="text" class="form-control" id="phone" onchange="validatePhone()" />
        <small class="text-danger" id="phoneError"></small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" onchange="validatePassword()" />
        <small class="text-danger" id="passwordError"></small>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" onchange="validateConfirmPassword()" />
        <small class="text-danger" id="confirmPasswordError"></small>
      </div>

      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
  </div>

</body>
</html>
